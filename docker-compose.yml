services:
  benchlog:
    build: .
    # Pre-built image also available at: ghcr.io/tsag1337/benchlog:stable
    container_name: benchlog
    restart: unless-stopped

    ports:
      - "3010:3001"

    environment:
      PORT: 3001
      DB_PATH: /data/database.db
      # JWT_SECRET: optional — auto-generated and persisted to /data/.jwt_secret on first run
      # DEMO_MODE: "true"  # uncomment to enable read-only demo mode (no login required)

      # ─── Image Storage ───────────────────────────────────────────────
      # Options: "local" (default) or "r2" (Cloudflare R2)
      # Set these in a .env file next to this docker-compose.yml (see .env.example)
      # or override them directly here.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}

    volumes:
      - ./data:/data

    logging:
      driver: json-file
      options:
        max-size: "10m"   # rotate each log file at 10 MB
        max-file: "3"     # keep at most 3 rotated files (30 MB total cap)
