services:
  benchlog:
    build: .
    # Pre-built image also available at: ghcr.io/tsag1337/benchlog:stable
    container_name: benchlog
    restart: unless-stopped

    ports:
      - "3010:3001"

    networks:
      - benchlog_network

    environment:
      PORT: 3001
      DB_PATH: /data/database.db
      DB_BACKEND: ${DB_BACKEND:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-}
      # JWT_SECRET: optional — auto-generated and persisted to /data/.jwt_secret on first run
      # DEMO_MODE: "true"  # uncomment to enable read-only demo mode (no login required)

      # ─── Internal service API ────────────────────────────────────────
      # Required to enable /api/internal/* endpoints for external containers.
      # Generate with: openssl rand -hex 32
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}

      # ─── Image Storage ───────────────────────────────────────────────
      # Options: "local" (default) or "r2" (Cloudflare R2)
      # Set these in a .env file next to this docker-compose.yml (see .env.example)
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}

    volumes:
      - ./data:/data

    logging:
      driver: json-file
      options:
        max-size: "10m"   # rotate each log file at 10 MB
        max-file: "3"     # keep at most 3 rotated files (30 MB total cap)

  # ─── PostgreSQL (optional) ───────────────────────────────────────────
  # Only starts when you activate the profile:
  #   docker compose --profile postgres up -d
  # For SQLite (default), just run: docker compose up -d
  postgres:
    image: postgres:16-alpine
    container_name: benchlog-db
    restart: unless-stopped
    profiles: ["postgres"]
    networks:
      - benchlog_network
    environment:
      POSTGRES_DB: benchlog
      POSTGRES_USER: benchlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchlog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  benchlog_network:
    name: benchlog_network
