name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote to stable (e.g. 1.1.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag as stable
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}

      - name: Summary
        run: |
          echo "### Promoted to stable" >> $GITHUB_STEP_SUMMARY
          echo "**${{ github.event.inputs.version }}** → \`stable\`" >> $GITHUB_STEP_SUMMARY
