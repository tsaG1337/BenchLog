name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote to stable (e.g. 1.1.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Retag as stable
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          crane tag ${IMAGE}:${{ github.event.inputs.version }} stable

      - name: Summary
        run: |
          echo "### Promoted to stable" >> $GITHUB_STEP_SUMMARY
          echo "**${{ github.event.inputs.version }}** → \`stable\`" >> $GITHUB_STEP_SUMMARY
